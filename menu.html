<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trig Game - Main Menu</title>
    <link rel="stylesheet" href="style/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>



    <main class="hero">
        <div class="container">
            <div class="beta-notice">CHOOSE YOUR PATH</div>
            <h1>Select Mode</h1>
            <p style="margin-bottom: 50px; max-width: 550px;">
                เลือกเส้นทางของคุณ! คุณต้องการเริ่มต้นทำความเข้าใจพื้นฐานของวงกลมหนึ่งหน่วย หรือพร้อมที่จะทดสอบความรู้ในโหมดท้าทายแล้ว?
            </p>
            
            <div class="mode-cards">
                <button class="mode-card" onclick="goToLearn()">
                    <div class="card-icon">📖</div>
                    <h3>เริ่มเรียนรู้เนื้อหา</h3>
                    <span class="card-desc">ปูพื้นฐานวงกลมหนึ่งหน่วยให้แน่น</span>
                </button>

                <button class="mode-card" onclick="goToGame()">
                    <div class="card-icon">🎮</div>
                    <h3>เริ่มเล่นเกม</h3>
                    <span class="card-desc">ท้าทายความรู้ด้วยมินิเกมจับเวลา</span>
                </button>
            </div>

        </div>
    </main>

    <button class="btn-ref-circle" onclick="showReference()" title="📚 อ้างอิง">
        i
    </button>

    <script src="script.js"></script>
</body>
</html>
